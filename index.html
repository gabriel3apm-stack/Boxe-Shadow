<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOXESHADOW - O Teu Treinador de Sombra</title>
    
    <!-- Configuração PWA (Opcional se os ficheiros existirem na pasta) -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ef4444">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- Frameworks e Tipografia -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: #f8fafc;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .display-font { font-family: 'Teko', sans-serif; }
        
        /* Efeitos Visuais de Treino e Descanso */
        .work-mode { border-color: #ef4444; box-shadow: 0 0 25px rgba(239, 68, 68, 0.2); }
        .rest-mode { border-color: #22c55e; box-shadow: 0 0 25px rgba(34, 197, 94, 0.2); }
        .mode-card.active { border-color: #ef4444; background-color: #1e293b; color: #ef4444; }
        
        /* Espaço para Publicidade (Google AdMob) */
        #ad-container {
            width: 100%;
            height: 60px;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-top: 1px solid #334155;
            position: fixed;
            bottom: 0;
            left: 0;
            z-index: 50;
        }
        .is-premium #ad-container { display: none; }
        .is-premium main { margin-bottom: 20px; }
        main { margin-bottom: 80px; transition: all 0.5s ease; }
        
        /* Scrollbar customizada para o Histórico */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="items-center p-4">

    <!-- CABEÇALHO -->
    <header class="w-full max-w-md text-center py-6">
        <div id="premium-badge" class="hidden text-[10px] bg-yellow-500 text-black font-bold px-3 py-1 rounded-full inline-block mb-3 uppercase tracking-widest shadow-lg">Versão PRO Ativa</div>
        <h1 class="display-font text-6xl font-bold italic text-red-600 tracking-wider uppercase leading-none">BOXESHADOW</h1>
        <p class="text-slate-400 text-sm uppercase tracking-widest mt-1">O Teu Treinador de Sombra</p>
    </header>

    <main id="main-container" class="w-full max-w-md bg-slate-800 rounded-3xl p-6 shadow-2xl border-2 border-slate-700 transition-all duration-500">
        
        <!-- VISTA: CONFIGURAÇÃO DO TREINO -->
        <div id="setup-view">
            <!-- Tabs de Navegação -->
            <div class="flex gap-2 mb-6 bg-slate-900 p-1 rounded-xl">
                <button onclick="showTab('setup')" id="tab-btn-setup" class="flex-1 py-2 text-xs font-bold uppercase rounded-lg bg-slate-800 text-red-500 shadow transition-all">Treino</button>
                <button onclick="showTab('history')" id="tab-btn-history" class="flex-1 py-2 text-xs font-bold uppercase rounded-lg text-slate-500 hover:text-white transition-all">Histórico</button>
            </div>

            <div id="tab-setup" class="space-y-6">
                <!-- Modo de Combate -->
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-3 tracking-wider">Modo de Combate</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="setMode('normal')" id="mode-normal" class="mode-card active border border-slate-700 p-3 rounded-xl text-[10px] font-bold uppercase transition-all">Padrão</button>
                        <button onclick="setMode('infighting')" id="mode-infighting" class="mode-card border border-slate-700 p-3 rounded-xl text-[10px] font-bold uppercase transition-all">Infighting</button>
                        <button onclick="setMode('outboxing')" id="mode-outboxing" class="mode-card border border-slate-700 p-3 rounded-xl text-[10px] font-bold uppercase transition-all">Outboxing</button>
                    </div>
                </div>

                <!-- Rounds -->
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2 tracking-wider">Número de Rounds</label>
                    <div class="flex items-center justify-between bg-slate-900 rounded-2xl p-3 border border-slate-700 shadow-inner">
                        <button onclick="changeVal('rounds', -1)" class="w-12 h-12 rounded-full bg-slate-700 hover:bg-red-600 text-2xl font-bold transition-colors shadow flex items-center justify-center pb-1">-</button>
                        <span id="val-rounds" class="text-4xl font-bold display-font">3</span>
                        <button onclick="changeVal('rounds', 1)" class="w-12 h-12 rounded-full bg-slate-700 hover:bg-red-600 text-2xl font-bold transition-colors shadow flex items-center justify-center pb-1">+</button>
                    </div>
                </div>

                <!-- Tempos (Trabalho/Descanso) -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-2 tracking-wider">Trabalho (Min)</label>
                        <div class="flex items-center justify-between bg-slate-900 rounded-xl p-3 border border-slate-700">
                            <button onclick="changeVal('work', -0.5)" class="text-slate-400 font-bold px-2 text-xl hover:text-white transition-colors">-</button>
                            <span id="val-work" class="text-xl font-bold display-font">3:00</span>
                            <button onclick="changeVal('work', 0.5)" class="text-slate-400 font-bold px-2 text-xl hover:text-white transition-colors">+</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-2 tracking-wider">Descanso (Seg)</label>
                        <div class="flex items-center justify-between bg-slate-900 rounded-xl p-3 border border-slate-700">
                            <button onclick="changeVal('rest', -15)" class="text-slate-400 font-bold px-2 text-xl hover:text-white transition-colors">-</button>
                            <span id="val-rest" class="text-xl font-bold display-font">60s</span>
                            <button onclick="changeVal('rest', 15)" class="text-slate-400 font-bold px-2 text-xl hover:text-white transition-colors">+</button>
                        </div>
                    </div>
                </div>

                <!-- Botão Iniciar -->
                <button onclick="startWorkout()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-5 rounded-2xl shadow-xl active:scale-95 text-xl tracking-widest transition-all">
                    COMEÇAR TREINO
                </button>
            </div>

            <!-- VISTA: HISTÓRICO E MONETIZAÇÃO -->
            <div id="tab-history" class="hidden space-y-4">
                <div id="history-list" class="space-y-3 max-h-[300px] overflow-y-auto pr-2">
                    <!-- Registos injetados via JavaScript -->
                </div>
                
                <!-- Card Premium -->
                <div id="premium-promo" class="bg-gradient-to-br from-slate-900 to-red-950 p-5 rounded-2xl border border-red-900/50 shadow-lg">
                    <h3 class="text-base font-bold text-yellow-500 mb-1">BOXESHADOW PRO</h3>
                    <p class="text-[11px] text-slate-400 mb-4 leading-relaxed uppercase">Remove anúncios e apoia o projeto.</p>
                    <button onclick="upgradeToPro()" class="w-full bg-yellow-600 hover:bg-yellow-500 text-white text-xs font-bold py-3 rounded-xl transition-all shadow-lg active:scale-95 uppercase tracking-widest">Remover Anúncios (1.99€)</button>
                </div>

                <button onclick="clearHistory()" class="w-full text-[10px] text-slate-500 uppercase font-bold hover:text-red-500 py-2 transition-colors">Limpar Histórico Local</button>
            </div>
        </div>

        <!-- VISTA: TREINO ATIVO -->
        <div id="workout-view" class="hidden text-center py-2">
            
            <!-- Barra Superior: Round e Kcal -->
            <div class="flex justify-between items-center mb-6">
                <div id="status-badge" class="px-5 py-1.5 rounded-full bg-red-600 text-xs font-black uppercase tracking-widest shadow-lg transition-colors">ROUND 1/3</div>
                <div id="kcal-display" class="text-sm font-bold text-slate-400 bg-slate-900/80 px-3 py-1 rounded-lg border border-slate-700">0 KCAL</div>
            </div>
            
            <!-- Cronómetro -->
            <div id="timer-display" class="display-font text-[9rem] font-bold leading-none mb-4 tabular-nums drop-shadow-xl transition-colors">03:00</div>
            
            <!-- Painel de Combos -->
            <div class="h-36 flex flex-col items-center justify-center mb-6 bg-slate-900/50 rounded-2xl border border-slate-700/50 overflow-hidden relative">
                <div id="combo-display" class="text-5xl font-black text-white uppercase tracking-tighter italic transition-all duration-200 z-10 px-2">
                    PREPARA-TE!
                </div>
                <div id="sub-combo" class="text-red-500 font-bold mt-2 h-6 uppercase text-xs tracking-widest z-10"></div>
            </div>

            <!-- Botões de Controlo -->
            <div class="flex gap-4">
                <button onclick="togglePause()" id="btn-pause" class="flex-[2] bg-slate-700 hover:bg-slate-600 py-5 rounded-2xl font-black uppercase tracking-widest transition-all shadow-lg text-sm">PAUSA</button>
                <button onclick="stopWorkout()" class="flex-1 bg-slate-950 border border-slate-700 hover:bg-red-950 py-5 rounded-2xl font-black uppercase text-sm transition-all shadow-lg">SAIR</button>
            </div>
        </div>
    </main>

    <!-- AdMob Placeholder (Visível apenas se não for Premium) -->
    <div id="ad-container">
        <div class="flex items-center opacity-40 text-[9px] font-bold">
            <span class="mr-3">⚡</span> ESPAÇO RESERVADO PARA ANÚNCIOS ADMOB <span class="ml-3">⚡</span>
        </div>
    </div>

    <!-- CÓDIGO FUNCIONAL -->
    <script>
        /* ---------------------------------------------------
           SISTEMA DE MONETIZAÇÃO E PREMIUM (LocalStorage)
        --------------------------------------------------- */
        let isPremium = localStorage.getItem('boxeshadow_pro_v1') === 'true';

        function checkPremium() {
            if (isPremium) {
                document.body.classList.add('is-premium');
                document.getElementById('premium-badge').classList.remove('hidden');
                document.getElementById('premium-promo').classList.add('hidden');
            }
        }

        function upgradeToPro() {
            if(confirm("Confirmar simulação de compra da versão PRO para remover anúncios?")) {
                isPremium = true;
                localStorage.setItem('boxeshadow_pro_v1', 'true');
                checkPremium();
                alert("Obrigado! És agora um utilizador PRO. Anúncios removidos.");
            }
        }

        /* ---------------------------------------------------
           VARIÁVEIS DE ESTADO E BASE DE DADOS DE GOLPES
        --------------------------------------------------- */
        let config = { rounds: 3, workTime: 180, restTime: 60, comboSpeed: 3200, mode: 'normal' };
        let currentRound = 1, timeLeft = 0, isWorking = true, isPaused = false, totalActiveSecs = 0;
        let timerInterval = null, comboInterval = null;

        // Base de Combos Dinâmicos baseados no Modo selecionado
        const comboPool = {
            normal: [
                {text:"1 - 2", desc:"Jab - Direto"},
                {text:"1 - 1 - 2", desc:"Jab - Jab - Direto"},
                {text:"1 - 2 - 3", desc:"Jab - Direto - Cruzado"},
                {text:"1 - 2 - Esq - 2", desc:"Jab - Direto - Esquiva - Direto"},
                {text:"3 - 2 - 3", desc:"Cruzado - Direto - Cruzado"},
                {text:"1 - 6 - 3", desc:"Jab - Uppercut - Cruzado"},
                {text:"2 - 3 - 2", desc:"Direto - Cruzado - Direto"}
            ],
            infighting: [
                {text:"4 - 5 - 4", desc:"Gancho - Uppercut - Gancho"},
                {text:"3 - 3 - 5", desc:"Cruzado - Cruzado - Uppercut"},
                {text:"Esq - 4 - 4", desc:"Esquiva - Gancho Corpo/Rosto"},
                {text:"5 - 6 - 3", desc:"Uppercut Esq/Dir - Cruzado"},
                {text:"Pêndulo - 4", desc:"Pêndulo - Gancho Fígado"}
            ],
            outboxing: [
                {text:"1 - 1", desc:"Jab - Jab (A Recuar)"},
                {text:"1 - 2 - Passo", desc:"Jab - Direto - Saída de Ângulo"},
                {text:"1 - Esq - 1", desc:"Jab - Esquiva Trás - Jab"},
                {text:"Pivot - 2", desc:"Pivot Lateral - Direto Rápido"},
                {text:"1 - 1 - 2 - Sai", desc:"Avança - Bate - Recua"}
            ]
        };

        /* ---------------------------------------------------
           SISTEMA DE ÁUDIO (Web Audio API - Sem ficheiros externos)
        --------------------------------------------------- */
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(freq=440, dur=200, vol=0.1, type='square') {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type; 
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                // Evitar cliques no áudio
                gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(vol, audioCtx.currentTime + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (dur/1000));
                
                osc.connect(gain); 
                gain.connect(audioCtx.destination);
                osc.start(); 
                osc.stop(audioCtx.currentTime + (dur/1000));
            } catch(e) { console.error("Audio Playback Error:", e); }
        }

        /* ---------------------------------------------------
           INTERFACE E CONFIGURAÇÃO
        --------------------------------------------------- */
        function showTab(tabName) {
            const isSetup = tabName === 'setup';
            document.getElementById('tab-setup').classList.toggle('hidden', !isSetup);
            document.getElementById('tab-history').classList.toggle('hidden', isSetup);
            
            const btnSetup = document.getElementById('tab-btn-setup');
            const btnHistory = document.getElementById('tab-btn-history');
            
            if(isSetup) {
                btnSetup.className = "flex-1 py-2 text-xs font-bold uppercase rounded-lg bg-slate-800 text-red-500 shadow transition-all";
                btnHistory.className = "flex-1 py-2 text-xs font-bold uppercase rounded-lg text-slate-500 hover:text-white transition-all";
            } else {
                btnHistory.className = "flex-1 py-2 text-xs font-bold uppercase rounded-lg bg-slate-800 text-red-500 shadow transition-all";
                btnSetup.className = "flex-1 py-2 text-xs font-bold uppercase rounded-lg text-slate-500 hover:text-white transition-all";
                loadHistory();
            }
        }

        function setMode(m) { 
            config.mode = m; 
            document.querySelectorAll('.mode-card').forEach(c => c.classList.toggle('active', c.id === `mode-${m}`)); 
        }

        function changeVal(type, delta) {
            if(type === 'rounds') { 
                config.rounds = Math.max(1, config.rounds + delta); 
                document.getElementById('val-rounds').innerText = config.rounds; 
            }
            else if(type === 'work') { 
                config.workTime = Math.max(30, config.workTime + (delta * 60)); 
                document.getElementById('val-work').innerText = formatTime(config.workTime); 
            }
            else if(type === 'rest') { 
                config.restTime = Math.max(0, config.restTime + delta); 
                document.getElementById('val-rest').innerText = config.restTime + 's'; 
            }
        }

        function formatTime(s) { 
            const m = Math.floor(s/60);
            const sec = (s%60).toString().padStart(2,'0');
            return `${m}:${sec}`; 
        }

        /* ---------------------------------------------------
           MOTOR DO TREINO (Cronómetro e Gestão de Combos)
        --------------------------------------------------- */
        function startWorkout() {
            // Retoma áudio para iOS/Safari
            if(audioCtx.state === 'suspended') audioCtx.resume();
            
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('workout-view').classList.remove('hidden');
            
            currentRound = 1; 
            isWorking = true; 
            timeLeft = config.workTime; 
            totalActiveSecs = 0;
            isPaused = false;
            
            updateUI(); 
            runTimer(); 
            startCombos(); 
            
            // Som Gongo Início
            playSound(600, 800, 0.3, 'sine');
        }

        function runTimer() {
            timerInterval = setInterval(() => {
                if(isPaused) return;
                
                if(isWorking) totalActiveSecs++;
                timeLeft--;

                const timerDisplay = document.getElementById('timer-display');

                // Alertas Finais (últimos 3 segs)
                if(timeLeft <= 3 && timeLeft > 0) {
                    playSound(440, 150, 0.2, 'square');
                    timerDisplay.style.color = '#ef4444'; // Pisca vermelho
                    setTimeout(() => timerDisplay.style.color = '#f8fafc', 500);
                }

                // Troca de Fase (Round/Descanso)
                if(timeLeft < 0) {
                    if(isWorking) {
                        if(currentRound >= config.rounds) {
                            finishWorkout();
                        } else {
                            // Entra no Descanso
                            isWorking = false;
                            timeLeft = config.restTime;
                            playSound(300, 1000, 0.3, 'sine'); // Som Grave
                            updateUI();
                        }
                    } else {
                        // Entra em Novo Round
                        isWorking = true;
                        currentRound++;
                        timeLeft = config.workTime;
                        playSound(600, 800, 0.3, 'sine'); // Som Gongo
                        updateUI();
                    }
                } else { 
                    timerDisplay.innerText = formatTime(timeLeft);
                    // Cálculo de Calorias (Média 12 kcal/min)
                    document.getElementById('kcal-display').innerText = `${Math.floor((totalActiveSecs/60)*12)} KCAL`;
                }
            }, 1000);
        }

        function startCombos() {
            comboInterval = setInterval(() => {
                if(isPaused || !isWorking) return;
                
                const pool = comboPool[config.mode];
                const combo = pool[Math.floor(Math.random() * pool.length)];
                const display = document.getElementById('combo-display');
                
                display.innerText = combo.text;
                document.getElementById('sub-combo').innerText = combo.desc;
                
                // Feedback visual do comando
                display.style.transform = "scale(1.1)";
                display.style.color = "#ef4444";
                setTimeout(() => {
                    display.style.transform = "scale(1)";
                    display.style.color = "white";
                }, 250);

                // Beep de comando
                playSound(800, 80, 0.05, 'triangle');
            }, config.comboSpeed);
        }

        function updateUI() {
            const badge = document.getElementById('status-badge');
            const container = document.getElementById('main-container');
            const timer = document.getElementById('timer-display');

            if(isWorking) {
                badge.innerText = `ROUND ${currentRound}/${config.rounds}`;
                badge.className = "px-5 py-1.5 rounded-full bg-red-600 text-xs font-black uppercase tracking-widest shadow-lg";
                container.className = "w-full max-w-md bg-slate-800 rounded-3xl p-6 shadow-2xl border-2 transition-all duration-500 work-mode";
                document.getElementById('combo-display').innerText = "VAMOS!";
            } else {
                badge.innerText = "DESCANSO";
                badge.className = "px-5 py-1.5 rounded-full bg-green-500 text-slate-900 text-xs font-black uppercase tracking-widest shadow-lg";
                container.className = "w-full max-w-md bg-slate-800 rounded-3xl p-6 shadow-2xl border-2 transition-all duration-500 rest-mode";
                document.getElementById('combo-display').innerText = "RESPIRA...";
                document.getElementById('sub-combo').innerText = "Recupera o fôlego";
            }
            timer.innerText = formatTime(timeLeft);
            timer.style.color = "#f8fafc"; // Reseta cor
        }

        function togglePause() { 
            isPaused = !isPaused; 
            const btn = document.getElementById('btn-pause');
            btn.innerText = isPaused ? 'CONTINUAR' : 'PAUSA'; 
            btn.classList.toggle('bg-green-600', isPaused);
            btn.classList.toggle('bg-slate-700', !isPaused);
        }
        
        function stopWorkout() { 
            if(!isPaused && !confirm("Desejas sair do treino atual?")) return;
            
            clearInterval(timerInterval); 
            clearInterval(comboInterval); 
            
            document.getElementById('setup-view').classList.remove('hidden'); 
            document.getElementById('workout-view').classList.add('hidden'); 
            document.getElementById('combo-display').innerText = "PREPARA-TE!";
            document.getElementById('sub-combo').innerText = "";
        }
        
        function finishWorkout() {
            saveToHistory();
            clearInterval(timerInterval);
            clearInterval(comboInterval);
            
            document.getElementById('combo-display').innerText = "CONCLUÍDO!";
            document.getElementById('combo-display').style.color = "#22c55e"; // Verde
            document.getElementById('sub-combo').innerText = "Bom trabalho, Campeão!";
            
            playSound(500, 300, 0.2); 
            setTimeout(() => playSound(700, 600, 0.2), 350);
            
            setTimeout(() => {
                document.getElementById('combo-display').style.color = "white";
                stopWorkout();
            }, 3500);
        }

        /* ---------------------------------------------------
           SISTEMA DE HISTÓRICO (LocalStorage)
        --------------------------------------------------- */
        function saveToHistory() {
            const history = JSON.parse(localStorage.getItem('boxeshadow_history_v1') || '[]');
            const entry = { 
                id: Date.now(),
                date: new Date().toLocaleDateString('pt-PT'), 
                mode: config.mode, 
                kcal: Math.floor((totalActiveSecs/60)*12),
                rounds: config.rounds
            };
            history.unshift(entry); // Adiciona no início
            localStorage.setItem('boxeshadow_history_v1', JSON.stringify(history.slice(0, 20))); // Guarda últimos 20
        }

        function loadHistory() {
            const list = document.getElementById('history-list');
            const data = JSON.parse(localStorage.getItem('boxeshadow_history_v1') || '[]');
            
            if(data.length === 0) {
                list.innerHTML = '<div class="text-center py-10 text-slate-500 italic text-xs uppercase tracking-widest">Ainda não há treinos registados.</div>';
                return;
            }

            list.innerHTML = data.map(item => `
                <div class="bg-slate-900 p-4 rounded-2xl border border-slate-700/50 flex justify-between items-center shadow-sm hover:border-slate-600 transition-colors">
                    <div>
                        <div class="text-[9px] text-slate-500 uppercase font-black tracking-widest mb-1">${item.date}</div>
                        <div class="text-sm font-bold uppercase text-red-500 leading-none">${item.mode}</div>
                        <div class="text-[10px] text-slate-400 mt-1">${item.rounds} Rounds Treinados</div>
                    </div>
                    <div class="text-right">
                        <div class="text-xl font-black text-white leading-none display-font">${item.kcal}</div>
                        <div class="text-[8px] text-slate-500 uppercase font-bold tracking-widest">Kcal Queimadas</div>
                    </div>
                </div>
            `).join('');
        }

        function clearHistory() { 
            if(confirm("Tens a certeza que queres apagar todo o teu histórico? Isto não pode ser revertido.")) { 
                localStorage.removeItem('boxeshadow_history_v1'); 
                loadHistory(); 
            } 
        }

        // Inicialização no arranque
        window.addEventListener('load', () => {
            checkPremium();
            // Registo PWA se suportado
            if ('serviceWorker' in navigator) { 
                navigator.serviceWorker.register('sw.js').catch(err => console.log('PWA não ativa', err)); 
            }
        });
    </script>
</body>
</html>
